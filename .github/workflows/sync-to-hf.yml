name: Sync to Hugging Face Space

on:
  push:
    branches: [main]
  workflow_dispatch: {}

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
          lfs: false

      - name: Push to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_SPACE: itanvirtuhin/Hf-Hermes
        run: |
          if [ -z "$HF_TOKEN" ]; then
            echo "HF_TOKEN repo secret is not set. Add a Hugging Face write token under" >&2
            echo "Settings -> Secrets and variables -> Actions -> New repository secret." >&2
            exit 1
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Push a single squashed commit of the current tree rather than full
          # history: HF's pre-receive hook scans every blob ever pushed, so a
          # full-history force-push keeps re-sending now-deleted binaries (it
          # rejected this sync over a since-removed banner image still sitting
          # in old commits). Squashing means only files present *now* are sent.
          git checkout --orphan hf-sync-squash
          git add -A
          git commit -m "Sync from main"
          git push "https://user:${HF_TOKEN}@huggingface.co/spaces/${HF_SPACE}" "hf-sync-squash:main" --force
