<svg width="1200" height="420" viewBox="0 0 1200 420" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Hermes Agent banner">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#08090e"/>
      <stop offset="100%" stop-color="#0c0e16"/>
    </linearGradient>
    <radialGradient id="glowIndigo" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#818cf8" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#818cf8" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowGreen" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#3dd68c" stop-opacity="0.30"/>
      <stop offset="100%" stop-color="#3dd68c" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="botHead" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1b2030"/>
      <stop offset="100%" stop-color="#151923"/>
    </linearGradient>
    <pattern id="dots" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.4" fill="#1b2032"/>
    </pattern>
  </defs>

  <rect width="1200" height="420" rx="28" fill="url(#bg)"/>
  <rect width="1200" height="420" rx="28" fill="url(#dots)"/>
  <circle cx="170" cy="120" r="260" fill="url(#glowIndigo)"/>
  <circle cx="1060" cy="340" r="240" fill="url(#glowGreen)"/>
  <rect x="0.5" y="0.5" width="1199" height="419" rx="27.5" fill="none" stroke="#1b2032" stroke-width="1"/>

  <!-- robot mark -->
  <g transform="translate(96,140)">
    <line x1="70" y1="0" x2="70" y2="-22" stroke="#5b6a8a" stroke-width="3" stroke-linecap="round"/>
    <circle cx="70" cy="-30" r="7" fill="#3dd68c"/>
    <rect x="0" y="0" width="140" height="120" rx="26" fill="url(#botHead)" stroke="#252e45" stroke-width="2"/>
    <circle cx="42" cy="54" r="13" fill="#818cf8"/>
    <circle cx="98" cy="54" r="13" fill="#818cf8"/>
    <circle cx="42" cy="54" r="4" fill="#dde5f8"/>
    <circle cx="98" cy="54" r="4" fill="#dde5f8"/>
    <path d="M 44 88 Q 70 102 96 88" stroke="#5b6a8a" stroke-width="3" fill="none" stroke-linecap="round"/>
    <rect x="-10" y="40" width="8" height="34" rx="4" fill="#1b2030" stroke="#252e45" stroke-width="2"/>
    <rect x="142" y="40" width="8" height="34" rx="4" fill="#1b2030" stroke="#252e45" stroke-width="2"/>
    <circle cx="124" cy="106" r="9" fill="#08090e" stroke="#3dd68c" stroke-width="3"/>
    <circle cx="124" cy="106" r="3.5" fill="#3dd68c"/>
  </g>

  <!-- title block -->
  <g transform="translate(300,150)">
    <text x="0" y="0" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="58" font-weight="700" fill="#dde5f8" letter-spacing="0.5">Hermes Agent</text>
    <text x="0" y="42" font-family="ui-monospace,Menlo,Consolas,monospace" font-size="18" fill="#5b6a8a" letter-spacing="1.5">SELF-HOSTED &#183; FREE-TIER &#183; HUGGING FACE SPACE</text>

    <!-- pills -->
    <g transform="translate(0,76)" font-family="ui-monospace,Menlo,Consolas,monospace" font-size="16" fill="#dde5f8">
      <g>
        <rect x="0" y="0" width="118" height="36" rx="18" fill="rgba(61,214,140,0.09)" stroke="#3dd68c" stroke-opacity="0.4"/>
        <circle cx="20" cy="18" r="5" fill="#3dd68c"/>
        <text x="34" y="24">Telegram</text>
      </g>
      <g transform="translate(134,0)">
        <rect x="0" y="0" width="160" height="36" rx="18" fill="rgba(129,140,248,0.10)" stroke="#818cf8" stroke-opacity="0.4"/>
        <circle cx="20" cy="18" r="5" fill="#818cf8"/>
        <text x="34" y="24">Hugging Face</text>
      </g>
      <g transform="translate(310,0)">
        <rect x="0" y="0" width="150" height="36" rx="18" fill="rgba(245,166,35,0.09)" stroke="#f5a623" stroke-opacity="0.4"/>
        <circle cx="20" cy="18" r="5" fill="#f5a623"/>
        <text x="34" y="24">Cloudflare</text>
      </g>
      <g transform="translate(476,0)">
        <rect x="0" y="0" width="118" height="36" rx="18" fill="rgba(221,229,248,0.07)" stroke="#5b6a8a" stroke-opacity="0.5"/>
        <circle cx="20" cy="18" r="5" fill="#dde5f8"/>
        <text x="34" y="24">Docker</text>
      </g>
    </g>
  </g>

  <text x="300" y="372" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="20" fill="#5b6a8a">No coding required &#8212; duplicate, add secrets, talk to your agent.</text>
</svg>
